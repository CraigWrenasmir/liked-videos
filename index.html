<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liked — Video Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #0a0a0a;
  --bg-card: #141414;
  --bg-card-hover: #1a1a1a;
  --bg-surface: #111111;
  --border-subtle: #222222;
  --border-hover: #333333;
  --text-primary: #e8e6e3;
  --text-secondary: #8a8785;
  --text-muted: #555350;
  --accent: #c8a97e;
  --accent-dim: #c8a97e22;
  --tag-music: #d4775e;
  --tag-documentary: #5e8ed4;
  --tag-writing: #a67ec8;
  --tag-art: #c8567e;
  --tag-gaming: #5ec87e;
  --tag-tech: #5ec8c8;
  --tag-comedy: #d4c45e;
  --tag-education: #5e7ed4;
  --tag-local: #d4a05e;
  --tag-podcast: #8a5ec8;
  --tag-film: #c8785e;
  --tag-news: #7e8a9e;
  --tag-kids: #5ed4a0;
  --tag-anime: #d45ea0;
  --tag-mix: #7ec8a0;
  --tag-own: #c8b87e;
  --tag-uncategorized: #555350;
  --radius: 8px;
  --radius-lg: 14px;
}

html { font-size: 15px; }

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grain overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
  z-index: 9999;
}

.app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border-subtle);
  padding: 0 clamp(16px, 3vw, 48px);
}

.header-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 24px 0 16px;
  gap: 24px;
  flex-wrap: wrap;
}

.logo {
  font-family: 'Instrument Serif', serif;
  font-size: 2rem;
  font-style: italic;
  color: var(--accent);
  letter-spacing: -0.02em;
  white-space: nowrap;
  user-select: none;
}

.logo span {
  font-style: normal;
  color: var(--text-muted);
  font-size: 0.9rem;
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  margin-left: 12px;
  letter-spacing: 0.05em;
}

.search-wrapper {
  flex: 1;
  max-width: 480px;
  min-width: 200px;
  position: relative;
}

.search-input {
  width: 100%;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: 40px;
  padding: 10px 20px 10px 44px;
  color: var(--text-primary);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.search-input::placeholder { color: var(--text-muted); }

.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}

.search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
}

.view-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}

.view-btn {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  color: var(--text-muted);
  padding: 8px 10px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
}

.view-btn:hover, .view-btn.active {
  color: var(--text-primary);
  border-color: var(--border-hover);
  background: var(--bg-card);
}

#shuffleBtn.active {
  color: var(--accent);
  border-color: var(--accent);
  background: var(--accent-dim);
}

.tag-bar {
  display: flex;
  gap: 6px;
  padding: 12px 0 16px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  mask-image: linear-gradient(to right, black 95%, transparent);
  -webkit-mask-image: linear-gradient(to right, black 95%, transparent);
}

.tag-bar::-webkit-scrollbar { display: none; }

.tag-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 40px;
  border: 1px solid var(--border-subtle);
  background: transparent;
  color: var(--text-secondary);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 400;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  user-select: none;
  letter-spacing: 0.01em;
}

.tag-pill:hover {
  border-color: var(--border-hover);
  color: var(--text-primary);
}

.tag-pill.active {
  background: var(--tag-color, var(--text-muted));
  border-color: transparent;
  color: #0a0a0a;
  font-weight: 500;
}

.tag-pill .count {
  font-size: 0.68rem;
  opacity: 0.6;
  font-weight: 300;
}

.tag-pill.active .count { opacity: 0.8; }

.main-content {
  padding: 24px clamp(16px, 3vw, 48px) 80px;
}

.results-info {
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-bottom: 20px;
  font-weight: 300;
  letter-spacing: 0.03em;
}

.results-info strong {
  color: var(--text-secondary);
  font-weight: 500;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.video-grid.list-view {
  grid-template-columns: 1fr;
  gap: 8px;
}

.video-card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s ease, border-color 0.2s, box-shadow 0.2s;
  position: relative;
}

.video-card:hover {
  transform: translateY(-2px);
  border-color: var(--border-hover);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

.video-card .thumb-wrap {
  position: relative;
  aspect-ratio: 16/9;
  overflow: hidden;
  background: #0d0d0d;
}

.video-card .thumb-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.3s ease, opacity 0.3s;
}

.video-card:hover .thumb-wrap img {
  transform: scale(1.04);
}

.play-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.1);
  opacity: 0;
  transition: opacity 0.2s;
}

.video-card:hover .play-overlay { opacity: 1; }

.play-btn-icon {
  width: 48px;
  height: 48px;
  background: rgba(0,0,0,0.75);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.1);
}

.play-btn-icon svg {
  fill: white;
  width: 20px;
  height: 20px;
  margin-left: 2px;
}

.card-info {
  padding: 12px 14px 14px;
}

.card-title {
  font-size: 0.85rem;
  font-weight: 500;
  line-height: 1.35;
  margin-bottom: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  color: var(--text-primary);
}

.card-channel {
  font-size: 0.75rem;
  color: var(--text-secondary);
  margin-bottom: 8px;
  font-weight: 300;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
}

.card-tag {
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 20px;
  background: var(--tag-color, #333);
  color: #0a0a0a;
  font-weight: 500;
  letter-spacing: 0.02em;
}

.edit-tags-btn {
  background: none;
  border: 1px solid var(--border-subtle);
  border-radius: 50%;
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 0.65rem;
  transition: all 0.15s;
  margin-left: auto;
  flex-shrink: 0;
}

.edit-tags-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* List view cards */
.list-view .video-card {
  display: flex;
  flex-direction: row;
  border-radius: var(--radius);
}

.list-view .thumb-wrap {
  width: 200px;
  min-width: 200px;
  aspect-ratio: 16/9;
}

.list-view .card-info {
  display: flex;
  flex-direction: column;
  justify-content: center;
  flex: 1;
  padding: 10px 16px;
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(12px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal-content {
  width: 90vw;
  max-width: 960px;
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transform: scale(0.95) translateY(10px);
  transition: transform 0.25s ease;
}

.modal-overlay.open .modal-content {
  transform: scale(1) translateY(0);
}

.modal-video {
  aspect-ratio: 16/9;
  width: 100%;
  background: black;
}

.modal-video iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.modal-info {
  padding: 20px 24px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}

.modal-title {
  font-family: 'Instrument Serif', serif;
  font-size: 1.3rem;
  line-height: 1.3;
  color: var(--text-primary);
}

.modal-channel {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-top: 4px;
  font-weight: 300;
}

.modal-close {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: 50%;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 1.1rem;
  flex-shrink: 0;
  transition: all 0.15s;
}

.modal-close:hover {
  color: var(--text-primary);
  border-color: var(--border-hover);
}

/* Tag editor modal */
.tag-editor-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  z-index: 1100;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.tag-editor-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.tag-editor {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 24px;
  width: 90vw;
  max-width: 440px;
}

.tag-editor h3 {
  font-family: 'Instrument Serif', serif;
  font-size: 1.2rem;
  margin-bottom: 6px;
  color: var(--text-primary);
}

.tag-editor .te-subtitle {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-bottom: 16px;
  font-weight: 300;
}

.tag-editor .te-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
}

.tag-editor .te-tag {
  padding: 6px 14px;
  border-radius: 40px;
  border: 1px solid var(--border-subtle);
  background: transparent;
  color: var(--text-secondary);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.15s;
}

.tag-editor .te-tag:hover {
  border-color: var(--border-hover);
}

.tag-editor .te-tag.selected {
  background: var(--tag-color, var(--text-muted));
  border-color: transparent;
  color: #0a0a0a;
  font-weight: 500;
}

.tag-editor .te-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

.te-btn {
  padding: 8px 20px;
  border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.15s;
}

.te-btn-cancel {
  background: transparent;
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
}

.te-btn-cancel:hover {
  border-color: var(--border-hover);
  color: var(--text-primary);
}

.te-btn-save {
  background: var(--accent);
  border: 1px solid transparent;
  color: #0a0a0a;
  font-weight: 500;
}

.te-btn-save:hover {
  background: #d4b88e;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }

/* Loading skeleton */
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

.skeleton {
  background: linear-gradient(90deg, var(--bg-card) 25%, #1a1a1a 50%, var(--bg-card) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius);
}

/* Fade-in animation for cards */
@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Slot machine shuffle animations */
@keyframes slotSpin {
  0% { transform: translateY(0); opacity: 1; }
  45% { transform: translateY(-100%); opacity: 0; }
  55% { transform: translateY(100%); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

@keyframes slotLand {
  0% { transform: translateY(40px) scale(0.95); opacity: 0; }
  60% { transform: translateY(-4px) scale(1.01); opacity: 1; }
  80% { transform: translateY(2px) scale(0.995); }
  100% { transform: translateY(0) scale(1); opacity: 1; }
}

.shuffling .video-card {
  animation: slotSpin 0.25s ease-in-out !important;
}

.shuffle-landed {
  animation: slotLand 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards !important;
}

.shuffle-active #shuffleBtn {
  animation: btnPulse 0.6s ease-in-out infinite;
}

@keyframes btnPulse {
  0%, 100% { box-shadow: 0 0 0 0 var(--accent-dim); }
  50% { box-shadow: 0 0 12px 4px var(--accent-dim); }
}

.video-card {
  animation: cardIn 0.3s ease forwards;
  opacity: 0;
}

.thumb-error {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  background: #1a1a1a;
  color: var(--text-muted);
  font-size: 0.75rem;
}

@media (max-width: 640px) {
  .video-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .header-top { padding: 16px 0 12px; }
  .logo { font-size: 1.5rem; }
  .list-view .thumb-wrap { width: 140px; min-width: 140px; }
}
</style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <div class="logo">Liked<span id="resultCount"></span></div>
    <div class="search-wrapper">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="search-input" placeholder="Search titles, channels..." id="searchInput" autocomplete="off">
    </div>
    <div class="view-controls">
      <button class="view-btn" id="shuffleBtn" title="Shuffle videos">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
      </button>
      <button class="view-btn active" id="gridViewBtn" title="Grid view" onclick="setView('grid')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      </button>
      <button class="view-btn" id="listViewBtn" title="List view" onclick="setView('list')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="4" width="18" height="4" rx="1.5"/><rect x="3" y="10" width="18" height="4" rx="1.5"/><rect x="3" y="16" width="18" height="4" rx="1.5"/></svg>
      </button>
    </div>
  </div>
  <div class="tag-bar" id="tagBar"></div>
</div>

<main class="main-content">
  <div class="results-info" id="resultsInfo"></div>
  <div class="video-grid" id="videoGrid"></div>
</main>

<!-- Video player modal -->
<div class="modal-overlay" id="playerModal" onclick="if(event.target===this)closePlayer()">
  <div class="modal-content">
    <div class="modal-video" id="modalVideo"></div>
    <div class="modal-info">
      <div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-channel" id="modalChannel"></div>
      </div>
      <button class="modal-close" onclick="closePlayer()">&times;</button>
    </div>
  </div>
</div>

<!-- Tag editor modal -->
<div class="tag-editor-overlay" id="tagEditorOverlay" onclick="if(event.target===this)closeTagEditor()">
  <div class="tag-editor">
    <h3>Edit Tags</h3>
    <div class="te-subtitle" id="teSubtitle"></div>
    <div class="te-tags" id="teTags"></div>
    <div class="te-actions">
      <button class="te-btn te-btn-cancel" onclick="closeTagEditor()">Cancel</button>
      <button class="te-btn te-btn-save" onclick="saveTagEdits()">Save</button>
    </div>
  </div>
</div>

// State
let videos = [];
let activeTags = new Set();
let searchQuery = '';
let currentView = 'grid';
let tagOverrides = {};
let editingVideoId = null;
let editingTags = new Set();
let isShuffled = false;
let isShuffling = false;
let shuffledVideos = [];

function getVideoId(url) {
  const m = url.match(/[?&]v=([^&]+)/);
  return m ? m[1] : '';
}

function autoTag(video) {
  const tags = new Set();
  const title = video.title || '';
  const channel = video.channel || '';
  const titleLower = title.toLowerCase();
  const channelLower = channel.toLowerCase();

  for (const [tag, def] of Object.entries(TAG_DEFS)) {
    // Check channel match
    for (const ch of def.channels) {
      if (channelLower.includes(ch.toLowerCase())) {
        tags.add(tag);
        break;
      }
    }
    // Check keyword match
    for (const kw of def.keywords) {
      if (titleLower.includes(kw.toLowerCase()) || channelLower.includes(kw.toLowerCase())) {
        tags.add(tag);
        break;
      }
    }
  }

  if (tags.size === 0) tags.add('Uncategorized');
  return [...tags];
}

function loadOverrides() {
  try {
    const saved = localStorage.getItem('yt-liked-tag-overrides');
    if (saved) tagOverrides = JSON.parse(saved);
  } catch(e) {}
}

function saveOverrides() {
  localStorage.setItem('yt-liked-tag-overrides', JSON.stringify(tagOverrides));
}

function getVideoTags(video) {
  const vid = getVideoId(video.url);
  if (tagOverrides[vid]) return tagOverrides[vid];
  return autoTag(video);
}

function init() {
  loadOverrides();
  videos = LIKED_VIDEOS.map((v, i) => ({
    ...v,
    id: getVideoId(v.url),
    index: i
  }));
  buildTagBar();
  render();

  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchQuery = e.target.value.toLowerCase();
    render();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closePlayer();
      closeTagEditor();
    }
  });

  document.getElementById('shuffleBtn').addEventListener('click', () => {
    if (isShuffling) return; // prevent double-click during animation
    isShuffled = !isShuffled;
    document.getElementById('shuffleBtn').classList.toggle('active', isShuffled);

    if (isShuffled) {
      window.scrollTo({ top: 0, behavior: 'smooth' });
      setTimeout(() => slotMachineShuffle(), 300);
    } else {
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  });
}

function buildTagBar() {
  const tagCounts = {};
  TAG_ORDER.forEach(t => tagCounts[t] = 0);

  videos.forEach(v => {
    getVideoTags(v).forEach(t => {
      tagCounts[t] = (tagCounts[t] || 0) + 1;
    });
  });

  const bar = document.getElementById('tagBar');
  bar.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'tag-pill active';
  allBtn.dataset.tag = '__all';
  allBtn.innerHTML = 'All <span class="count">' + videos.length + '</span>';
  allBtn.addEventListener('click', () => toggleTag('__all'));
  bar.appendChild(allBtn);

  TAG_ORDER.forEach(tag => {
    if (tagCounts[tag] > 0) {
      const colorVar = TAG_DEFS[tag] ? TAG_DEFS[tag].color : 'var(--tag-uncategorized)';
      const btn = document.createElement('button');
      btn.className = 'tag-pill';
      btn.dataset.tag = tag;
      btn.style.setProperty('--tag-color', colorVar);
      btn.innerHTML = tag + ' <span class="count">' + tagCounts[tag] + '</span>';
      btn.addEventListener('click', () => toggleTag(tag));
      bar.appendChild(btn);
    }
  });
}

function toggleTag(tag) {
  if (tag === '__all') {
    activeTags.clear();
  } else {
    if (activeTags.has(tag)) {
      activeTags.delete(tag);
    } else {
      activeTags.add(tag);
    }
  }
  updateTagPills();
  render();
}

function updateTagPills() {
  document.querySelectorAll('.tag-pill').forEach(pill => {
    const t = pill.dataset.tag;
    if (t === '__all') {
      pill.classList.toggle('active', activeTags.size === 0);
    } else {
      pill.classList.toggle('active', activeTags.has(t));
    }
  });
}

function getFilteredVideos() {
  const source = isShuffled ? shuffledVideos : videos;
  return source.filter(v => {
    // Tag filter
    if (activeTags.size > 0) {
      const vTags = getVideoTags(v);
      if (!vTags.some(t => activeTags.has(t))) return false;
    }
    // Search filter
    if (searchQuery) {
      const haystack = (v.title + ' ' + v.channel).toLowerCase();
      const terms = searchQuery.split(/\s+/);
      if (!terms.every(term => haystack.includes(term))) return false;
    }
    return true;
  });
}

function render() {
  const filtered = getFilteredVideos();
  const grid = document.getElementById('videoGrid');
  const info = document.getElementById('resultsInfo');
  const count = document.getElementById('resultCount');

  count.textContent = filtered.length + ' of ' + videos.length + ' videos';
  info.innerHTML = activeTags.size > 0 || searchQuery
    ? '<strong>' + filtered.length + '</strong> videos matching your filters'
    : '<strong>' + videos.length + '</strong> liked videos in your library';

  grid.innerHTML = '';
  const fragment = document.createDocumentFragment();

  filtered.forEach((v, i) => {
    const tags = getVideoTags(v);
    const thumbUrl = 'https://img.youtube.com/vi/' + v.id + '/mqdefault.jpg';
    const delay = Math.min(i * 0.02, 0.5);

    const card = document.createElement('div');
    card.className = 'video-card';
    card.style.animationDelay = delay + 's';
    card.addEventListener('click', () => openPlayer(v.id));

    const thumbWrap = document.createElement('div');
    thumbWrap.className = 'thumb-wrap';
    const img = document.createElement('img');
    img.src = thumbUrl;
    img.alt = '';
    img.loading = 'lazy';
    img.onerror = function() {
      this.parentNode.innerHTML = '<div class="thumb-error">Unavailable</div>';
    };
    thumbWrap.appendChild(img);

    const overlay = document.createElement('div');
    overlay.className = 'play-overlay';
    overlay.innerHTML = '<div class="play-btn-icon"><svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg></div>';
    thumbWrap.appendChild(overlay);
    card.appendChild(thumbWrap);

    const cardInfo = document.createElement('div');
    cardInfo.className = 'card-info';

    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = v.title;
    cardInfo.appendChild(title);

    const channel = document.createElement('div');
    channel.className = 'card-channel';
    channel.textContent = v.channel;
    cardInfo.appendChild(channel);

    const tagsDiv = document.createElement('div');
    tagsDiv.className = 'card-tags';
    tags.forEach(t => {
      const color = TAG_DEFS[t] ? TAG_DEFS[t].color : 'var(--tag-uncategorized)';
      const tagSpan = document.createElement('span');
      tagSpan.className = 'card-tag';
      tagSpan.style.setProperty('--tag-color', color);
      tagSpan.textContent = t;
      tagsDiv.appendChild(tagSpan);
    });

    const editBtn = document.createElement('button');
    editBtn.className = 'edit-tags-btn';
    editBtn.title = 'Edit tags';
    editBtn.innerHTML = '&#9998;';
    editBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      openTagEditor(v.id);
    });
    tagsDiv.appendChild(editBtn);

    cardInfo.appendChild(tagsDiv);
    card.appendChild(cardInfo);
    fragment.appendChild(card);
  });

  grid.appendChild(fragment);
}

function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function openPlayer(videoId) {
  window.open('https://www.youtube.com/watch?v=' + videoId, '_blank');
}

function closePlayer() {
  const modal = document.getElementById('playerModal');
  modal.classList.remove('open');
  document.getElementById('modalVideo').innerHTML = '';
  document.body.style.overflow = '';
}

function openTagEditor(videoId) {
  const video = videos.find(v => v.id === videoId);
  if (!video) return;
  editingVideoId = videoId;
  editingTags = new Set(getVideoTags(video));

  document.getElementById('teSubtitle').textContent = video.title;

  const container = document.getElementById('teTags');
  container.innerHTML = '';
  TAG_ORDER.forEach(tag => {
    if (tag === 'Uncategorized') return;
    const color = TAG_DEFS[tag] ? TAG_DEFS[tag].color : 'var(--tag-uncategorized)';
    const btn = document.createElement('button');
    btn.className = 'te-tag' + (editingTags.has(tag) ? ' selected' : '');
    btn.style.setProperty('--tag-color', color);
    btn.textContent = tag;
    btn.addEventListener('click', () => {
      if (editingTags.has(tag)) {
        editingTags.delete(tag);
        btn.classList.remove('selected');
      } else {
        editingTags.add(tag);
        btn.classList.add('selected');
      }
    });
    container.appendChild(btn);
  });
  document.getElementById('tagEditorOverlay').classList.add('open');
}

function closeTagEditor() {
  document.getElementById('tagEditorOverlay').classList.remove('open');
  editingVideoId = null;
}

function toggleEditTag(btn, tag) {
  if (editingTags.has(tag)) {
    editingTags.delete(tag);
    btn.classList.remove('selected');
  } else {
    editingTags.add(tag);
    btn.classList.add('selected');
  }
}

function saveTagEdits() {
  if (!editingVideoId) return;
  const tags = [...editingTags];
  if (tags.length === 0) tags.push('Uncategorized');
  tagOverrides[editingVideoId] = tags;
  saveOverrides();
  closeTagEditor();
  buildTagBar();
  render();
}

function quickShuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function slotMachineShuffle() {
  isShuffling = true;
  document.body.classList.add('shuffle-active');
  const grid = document.getElementById('videoGrid');

  // Generate the final shuffled result
  shuffledVideos = quickShuffle(videos);

  // Schedule of spins: [delay from start in ms, duration of spin animation]
  // Starts fast, gets progressively slower — like a slot machine winding down
  const ticks = [];
  let t = 0;
  let interval = 80;  // start very fast
  const totalDuration = 7000;

  while (t < totalDuration - 600) {
    ticks.push(t);
    // Exponential slowdown
    interval = interval * 1.18;
    t += interval;
  }

  const visibleCards = () => grid.querySelectorAll('.video-card');

  ticks.forEach((time, idx) => {
    setTimeout(() => {
      // For each tick, show a random arrangement
      const tempShuffle = idx === ticks.length - 1 ? shuffledVideos : quickShuffle(videos);
      const source = tempShuffle;
      const filtered = source.filter(v => {
        if (activeTags.size > 0) {
          const vTags = getVideoTags(v);
          if (!vTags.some(t => activeTags.has(t))) return false;
        }
        if (searchQuery) {
          const haystack = (v.title + ' ' + v.channel).toLowerCase();
          const terms = searchQuery.split(/\s+/);
          if (!terms.every(term => haystack.includes(term))) return false;
        }
        return true;
      });

      // Update just the visible card contents (swap thumbnails/titles in place)
      const cards = visibleCards();
      const limit = Math.min(cards.length, filtered.length);

      for (let i = 0; i < limit; i++) {
        const v = filtered[i];
        const card = cards[i];
        const img = card.querySelector('.thumb-wrap img');
        const titleEl = card.querySelector('.card-title');
        const channelEl = card.querySelector('.card-channel');

        if (img) img.src = 'https://img.youtube.com/vi/' + v.id + '/mqdefault.jpg';
        if (titleEl) titleEl.textContent = v.title;
        if (channelEl) channelEl.textContent = v.channel;

        // Quick vertical jolt on each tick
        card.style.transition = 'transform 0.08s ease-out';
        card.style.transform = 'translateY(-6px)';
        setTimeout(() => {
          card.style.transform = 'translateY(0)';
        }, 60);
      }
    }, time);
  });

  // Final settle: full re-render with landing animation
  const finalTime = ticks[ticks.length - 1] + 300;
  setTimeout(() => {
    render();

    // Apply staggered landing bounce to visible cards
    const finalCards = grid.querySelectorAll('.video-card');
    finalCards.forEach((card, i) => {
      card.style.animation = 'none';
      card.offsetHeight; // force reflow
      const stagger = Math.min(i * 30, 1500);
      card.style.animationDelay = stagger + 'ms';
      card.classList.add('shuffle-landed');
    });

    // Cleanup
    setTimeout(() => {
      finalCards.forEach(card => {
        card.classList.remove('shuffle-landed');
        card.style.animationDelay = '';
        card.style.animation = '';
      });
      document.body.classList.remove('shuffle-active');
      isShuffling = false;
    }, 2000);
  }, finalTime);
}

function setView(view) {
  currentView = view;
  const grid = document.getElementById('videoGrid');
  grid.classList.toggle('list-view', view === 'list');
  document.getElementById('gridViewBtn').classList.toggle('active', view === 'grid');
  document.getElementById('listViewBtn').classList.toggle('active', view === 'list');
}

init();
</script>
